services:
  - type: web
    name: eduboom-crm
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEMO_SEED
        value: "true"
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: eduboom-crm-db
          property: connectionString

databases:
  - name: eduboom-crm-db
    databaseName: eduboom
    user: eduboom
