function input(k,l,v="",type="text"){return`<label><span>${l}</span><input id=f_${k} type=${type} value="${v??""}"></label>`}
function sel(k,l,opts,v=""){return`<label><span>${l}</span><select id=f_${k}>${opts.map(o=>{let val=Array.isArray(o)?o[0]:o,txt=Array.isArray(o)?o[1]:o;return`<option value="${val}" ${String(val)===String(v)?"selected":""}>${txt}</option>`}).join("")}</select></label>`}
function val(k){return $("f_"+k)?.value||""}function closeM(){$("modal").classList.remove("on")}
function modal(m,eid=""){let x={}; if(eid){let map={student:"students",lead:"leads",teacher:"teachers",course:"courses",group:"groups"};x=db[map[m]].find(z=>z.id===eid)||{}}$("modal").classList.add("on");$("mt").textContent=m;$("mb").innerHTML=forms[m](x,eid)}
const forms={student:(s,e)=>`<div class=fg>${input("name",tr("name"),s.name)}${input("phone",tr("phone"),s.phone)}${input("parent",tr("parent"),s.parent)}${input("age",tr("age"),s.age,"number")}${input("level",tr("level"),s.level)}${sel("status",tr("status"),["trial","active","frozen","graduated","left"],s.status||"active")}${input("course",tr("course"),s.course)}${sel("group",tr("group"),db.groups.map(g=>[g.id,g.name]),s.group)}${input("balance",tr("debt"),s.balance||0,"number")}<label class=full><span>${tr("note")}</span><textarea id=f_note>${s.note||""}</textarea></label></div>${actions(`saveStudent('${e}')`)}`,lead:(l,e)=>`<div class=fg>${input("name",tr("name"),l.name)}${input("phone",tr("phone"),l.phone)}${input("age",tr("age"),l.age,"number")}${input("course",tr("course"),l.course)}${input("source",tr("source"),l.source)}${sel("status",tr("status"),["received","trial","enrolled","firstPayment"],l.status||"received")}<label class=full><span>${tr("note")}</span><textarea id=f_note>${l.note||""}</textarea></label></div>${actions(`saveLead('${e}')`)}`,payment:()=>`<div class=fg>${sel("student",tr("students"),db.students.map(s=>[s.id,s.name]))}${input("amount",tr("amount"),0,"number")}${sel("method",tr("method"),["cash","card","click","payme"])}${input("date","Date",today(),"date")}</div>${actions("savePayment()")}`,teacher:(t,e)=>`<div class=fg>${input("name",tr("name"),t.name)}${input("phone",tr("phone"),t.phone)}${input("spec","Specialisation",t.spec)}${input("percent",tr("percent"),t.percent||40,"number")}</div>${actions(`saveTeacher('${e}')`)}`,course:(c,e)=>`<div class=fg>${input("name",tr("course"),c.name)}<label class=full><span>${tr("paymentType")}</span><div class=choices><button class="choice ${c.type!=="perLesson"?"on":""}" onclick="payChoice('monthly',this)" type=button><b>${tr("monthly")}</b><small>Monthly control</small></button><button class="choice ${c.type==="perLesson"?"on":""}" onclick="payChoice('perLesson',this)" type=button><b>${tr("perLesson")}</b><small>Per lesson control</small></button></div><input type=hidden id=f_type value="${c.type||"monthly"}"></label>${input("price",tr("price"),c.price||0,"number")}${input("days",tr("days"),c.days)}${input("duration",tr("duration"),c.duration)}</div>${actions(`saveCourse('${e}')`)}`,group:(g,e)=>`<div class=fg>${input("name",tr("group"),g.name)}${sel("course",tr("course"),db.courses.map(c=>[c.id,c.name]),g.course)}${sel("teacher",tr("teacher"),db.teachers.map(t=>[t.id,t.name]),g.teacher)}${input("room","Room",g.room)}${input("schedule","Schedule",g.schedule)}</div>${actions(`saveGroup('${e}')`)}`};
function actions(fn){return`<div class=ma><button class="btn sec" onclick="closeM()">${tr("cancel")}</button><button class=btn onclick="${fn}">${tr("save")}</button></div>`}function payChoice(v,b){$("f_type").value=v;b.parentElement.querySelectorAll(".choice").forEach(x=>x.classList.remove("on"));b.classList.add("on")}
function saveStudent(e){let o={id:e||id(),name:val("name"),phone:val("phone"),parent:val("parent"),age:val("age"),level:val("level"),status:val("status"),course:val("course"),group:val("group"),balance:+val("balance")||0,note:val("note")};up("students",o,e)}
function saveLead(e){let o={id:e||id(),name:val("name"),phone:val("phone"),age:val("age"),course:val("course"),source:val("source"),status:val("status"),note:val("note")};up("leads",o,e)}
function saveTeacher(e){let o={id:e||id(),name:val("name"),phone:val("phone"),spec:val("spec"),percent:+val("percent")||0};up("teachers",o,e)}
function saveCourse(e){let o={id:e||id(),name:val("name"),type:val("type"),price:+val("price")||0,days:val("days"),duration:val("duration")};up("courses",o,e)}
function saveGroup(e){let o={id:e||id(),name:val("name"),course:val("course"),teacher:val("teacher"),room:val("room"),schedule:val("schedule")};up("groups",o,e)}
function up(k,o,e){if(e)Object.assign(db[k].find(x=>x.id===e),o);else db[k].push(o);save();closeM();render();toast("Saved")}
function savePayment(){let s=db.students.find(x=>x.id===val("student")),g=db.groups.find(x=>x.id===s?.group),a=+val("amount")||0;db.payments.push({id:id(),student:s?.name||"Unknown",studentId:s?.id,group:s?.group,teacher:g?.teacher,amount:a,method:val("method"),date:val("date")||today()});if(s)s.balance=Math.max(0,(+s.balance||0)-a);save();closeM();render();toast("Saved")}
function exportDB(){let b=new Blob([JSON.stringify(db,null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="eduboom-crm-data.json";a.click()}
$("role").onchange=e=>{role=e.target.value;render()};document.querySelectorAll("[data-l]").forEach(b=>b.onclick=()=>{lang=b.dataset.l;localStorage.eb_lang=lang;render()});render();
</script>
</body>
</html>
